<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e10f28',
                        'primary-dark': '#b00c20',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-down { animation: slideDown 0.3s ease-out; }
        #notification-dropdown {
            animation: slideDown 0.2s ease-out;
        }
        .notification-item {
            transition: background-color 0.2s;
        }
        .notification-item:hover {
            background-color: #f9fafb;
        }
        @keyframes gradientShift {
            0% {
            background-position: 0% 50%;
            }
            50% {
            background-position: 100% 50%;
            }
            100% {
            background-position: 0% 50%;
            }
        }
        .animated-gradient {
            background: linear-gradient(
            135deg,
            #fff7ed,
            #fde2e4,
            #f9a8d4,
            #f472b6
            );
            background-size: 300% 300%;
            animation: gradientShift 12s ease infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Login Page -->
<div
  id="login-page"
  class="min-h-screen flex items-center justify-center px-4 animated-gradient"
>
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
    <div class="text-center mb-8">
      <img
        src="https://thecareline.org/wp-content/uploads/2025/10/CARELINE-1-HEARTBEAT-LOGO-01.png"
        alt="Careline Heartbeat Logo"
      />
    </div>

    <div id="login-message" class="hidden mb-4 p-3 rounded-lg"></div>

    <form onsubmit="handleLogin(event)" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Username or Email
        </label>
        <input
          type="text"
          id="username"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          placeholder="Enter username or email"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>
        <input
          type="password"
          id="password"
          required
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          placeholder="Enter password"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-lg transition-colors"
      >
        Login
      </button>
    </form>
  </div>
</div>


    <!-- Main Application (Hidden by default) -->
    <div id="main-app" class="hidden">
        <!-- Doctor Offline Alert Ribbon (Red, Top Priority) -->
        <div id="doctor-offline-ribbon" class="hidden bg-red-600 text-white py-3 px-6 shadow-lg">
            <div class="container mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <div>
                        <p class="font-bold text-lg" id="doctor-offline-message">🚨 URGENT: Doctor Went Offline</p>
                        <p class="text-sm text-red-100" id="doctor-offline-details"></p>
                    </div>
                </div>
                <button onclick="dismissDoctorOfflineRibbon()" class="text-white hover:text-red-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Bulletin Panel Backdrop -->
        <div id="bulletin-backdrop" onclick="toggleBulletinPanel()" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 transition-opacity duration-300"></div>
        
        <!-- Bulletin Panel (Collapsible Sidebar) -->
        <div id="bulletin-panel" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl transform transition-transform duration-300 ease-in-out z-40" style="transform: translateX(100%);">
            <div class="h-full flex flex-col">
                <!-- Header -->
                <div class="bg-gradient-to-r from-primary to-primary-dark text-white p-4 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
                        </svg>
                        <h3 class="font-bold text-lg">Announcements</h3>
                    </div>
                    <button onclick="toggleBulletinPanel()" class="text-white hover:text-gray-200 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Content -->
                <div class="flex-1 overflow-y-auto p-4">
                    <div id="bulletin-content" class="space-y-3">
                        <p class="text-gray-500 text-center py-8">Loading announcements...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bulletin Toggle Button (Floating) -->
        <button id="bulletin-toggle-btn" onclick="toggleBulletinPanel()" class="hidden fixed right-4 top-20 bg-primary hover:bg-primary-dark text-white p-3 rounded-full shadow-lg z-30 transition-all hover:scale-110 flex items-center justify-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
            </svg>
            <span id="bulletin-badge" class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">!</span>
        </button>

        <!-- Navigation -->
        <nav class="bg-gradient-to-r text-black shadow-2xl" background="white">
            <div class="container mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://thecareline.org/wp-content/uploads/2025/10/CARELINE-1-HEARTBEAT-LOGO-01.png" alt="Careline Heartbeat Logo" class="w-36 h-11"/>
                        <div>
                            <h1 class="text-2xl font-bold" id="portal-name"></h1>
                            <p class="text-xs text-black-200" id="user-name-display"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <!-- Notification Bell -->
                        <div class="relative">
                            <button id="notification-button" onclick="toggleNotifications()" class="relative p-2 hover:bg-white hover:bg-opacity-20 rounded-lg transition-all">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                                </svg>
                                <!-- Notification Badge -->
                                <span id="notification-badge" class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
                            </button>
                            
                            <!-- Notification Dropdown -->
                            <div id="notification-dropdown" class="hidden absolute right-0 mt-2 w-96 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 max-h-96 overflow-y-auto">
                                <div class="p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white">
                                    <h3 class="font-bold text-gray-800">Notifications</h3>
                                    <button onclick="markAllAsRead()" class="text-sm text-primary hover:text-primary-dark">Mark all read</button>
                                </div>
                                <div id="notification-list" class="divide-y divide-gray-100">
                                    <p class="text-gray-500 text-center py-8 text-sm">Loading notifications...</p>
                                </div>
                            </div>
                        </div>
                        
                        <button onclick="logout()" class="px-4 py-2 bg-white bg-opacity-20 rounded-lg hover:bg-opacity-30 transition-all">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <div class="container mx-auto px-6 py-8" id="content-area">
            <!-- Dynamic content loaded here -->
        </div>
    </div>

    <!-- Custom PopUp Modal -->
    <div id="popup-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 slide-down relative">
            <!-- Close X button -->
            <button onclick="closePopUp()" aria-label="Close popup" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div class="text-center mb-6">
                <div id="popup-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <!-- Icon loaded dynamically -->
                </div>
                <h3 id="popup-title" class="text-2xl font-bold text-gray-800 mb-2"></h3>
                <p id="popup-message" class="text-gray-600"></p>
            </div>
            <div id="popup-button-container" class="grid grid-cols-2 gap-3 mt-6"></div>
        </div>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
