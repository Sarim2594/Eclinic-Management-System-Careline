<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e10f28',
                        'primary-dark': '#b00c20',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-down { animation: slideDown 0.3s ease-out; }
        #notification-dropdown {
            animation: slideDown 0.2s ease-out;
        }
        .notification-item {
            transition: background-color 0.2s;
        }
        .notification-item:hover {
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Login Page -->
    <div id="login-page" class="min-h-screen flex items-center justify-center px-4" style="background: linear-gradient(to bottom right, white, red);">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
            <div class="text-center mb-8">
                <img src="https://thecareline.org/wp-content/uploads/2025/10/CARELINE-1-HEARTBEAT-LOGO-01.png" alt="Careline Heartbeat Logo"/>
            </div>
            
            <div id="login-message" class="hidden mb-4 p-3 rounded-lg"></div>
            
            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username or Email</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Enter username or email">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-lg transition-colors">
                    Login
                </button>
            </form>
        </div>
    </div>

    <!-- Main Application (Hidden by default) -->
    <div id="main-app" class="hidden">
        <!-- Bulletin Board (Top of screen - PROMINENT) -->
        <div id="bulletin-banner" class="bg-red-600 border-b-4 border-red-600">
            <div class="container mx-auto px-6 py-4">
                <div id="bulletin-content" class="space-y-3"> 
                    </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="bg-gradient-to-r text-black shadow-2xl" background="white">
            <div class="container mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img src="https://thecareline.org/wp-content/uploads/2025/10/CARELINE-1-HEARTBEAT-LOGO-01.png" alt="Careline Heartbeat Logo" class="w-36 h-11"/>
                        <div>
                            <h1 class="text-2xl font-bold" id="portal-name"></h1>
                            <p class="text-xs text-black-200" id="user-name-display"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <!-- Notification Bell -->
                        <div class="relative">
                            <button onclick="toggleNotifications()" class="relative p-2 hover:bg-white hover:bg-opacity-20 rounded-lg transition-all">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                                </svg>
                                <!-- Notification Badge -->
                                <span id="notification-badge" class="hidden absolute -top-1 -right-1 bg-red-600 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
                            </button>
                            
                            <!-- Notification Dropdown -->
                            <div id="notification-dropdown" class="hidden absolute right-0 mt-2 w-96 bg-white rounded-xl shadow-2xl border border-gray-200 z-50 max-h-96 overflow-y-auto">
                                <div class="p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white">
                                    <h3 class="font-bold text-gray-800">Notifications</h3>
                                    <button onclick="markAllAsRead()" class="text-sm text-primary hover:text-primary-dark">Mark all read</button>
                                </div>
                                <div id="notification-list" class="divide-y divide-gray-100">
                                    <p class="text-gray-500 text-center py-8 text-sm">Loading notifications...</p>
                                </div>
                            </div>
                        </div>
                        
                        <button onclick="logout()" class="px-4 py-2 bg-white bg-opacity-20 rounded-lg hover:bg-opacity-30 transition-all">
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content Area -->
        <div class="container mx-auto px-6 py-8" id="content-area">
            <!-- Dynamic content loaded here -->
        </div>
    </div>

    <!-- Custom PopUp Modal -->
    <div id="notification-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-4 slide-down">
            <div class="text-center mb-6">
                <div id="notif-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <!-- Icon loaded dynamically -->
                </div>
                <h3 id="notif-title" class="text-2xl font-bold text-gray-800 mb-2"></h3>
                <p id="notif-message" class="text-gray-600"></p>
            </div>
            <button onclick="closePopUp()" class="w-full px-6 py-3 bg-primary hover:bg-primary-dark text-white rounded-lg font-medium transition-colors">
                Got it!
            </button>
        </div>
    </div>

    <script type="module" src="/static/app.js"></script>
</body>
</html>
