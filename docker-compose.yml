version: '3.8'

services:
  db:
    image: postgres:15
    container_name: careline-db
    environment:
      POSTGRES_DB: careline
      POSTGRES_USER: neondb_owner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careline-network

  backend:
    build: ./backend
    container_name: careline-backend
    environment:
      DATABASE_URL: postgresql://neondb_owner:${DB_PASSWORD}@db:5432/careline
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 5000

  frontend:
    build: ./frontend
    restart: always
    container_name: careline-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - careline-network

volumes:
  postgres_data:

networks:
  careline-network:
    driver: bridge