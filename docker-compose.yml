version: '3.8'

services:
  db:
    image: postgres:15
    container_name: careline-db
    environment:
      POSTGRES_DB: careline
      POSTGRES_USER: sarim
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - careline-network

  backend:
    build: ./backend
    container_name: careline-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: careline
      DB_USER: sarim
      DB_PASSWORD: ${DB_PASSWORD}
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
    depends_on:
      - db
    expose:
      - "5000"
    networks:
      - careline-network

  frontend:
    build: ./frontend
    restart: always
    container_name: careline-frontend
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - careline-network

volumes:
  postgres_data:

networks:
  careline-network:
    driver: bridge
